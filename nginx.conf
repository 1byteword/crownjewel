worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Cache-Control by content type.
    #
    # HTML: no-cache tells Cloudflare and browsers they may *store* the
    # response but MUST revalidate with origin before serving it again.
    # Because nginx emits ETag / Last-Modified for static files, the
    # revalidation almost always returns a tiny 304 -- effectively free --
    # and a deploy is visible at the edge within the next request, with
    # no manual purge required.
    #
    # Static assets: immutable 1-year. They effectively never change at a
    # given URL (a redeploy is a whole new image), and if we ever want to
    # force a bust we can add a query string at the reference site.
    map $sent_http_content_type $cache_control {
        default                       "public, no-cache, must-revalidate";
        ~^text/html                   "public, no-cache, must-revalidate";
        ~^text/css                    "public, max-age=31536000, immutable";
        ~^application/javascript      "public, max-age=31536000, immutable";
        ~^image/                      "public, max-age=31536000, immutable";
        ~^font/                       "public, max-age=31536000, immutable";
        ~^application/font            "public, max-age=31536000, immutable";
    }

    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers (apply to every response, including errors)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control $cache_control always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 404 /404.html;
    }
}
