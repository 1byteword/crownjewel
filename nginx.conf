worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Cache-Control by content type.
    #
    # HTML: short-but-real TTL + stale-while-revalidate. Cloudflare and
    # browsers cache for 5 minutes, then CF serves stale for up to 24h
    # while refetching in the background. `make ship` purges CF on deploy
    # so edits are instant at release time; between deploys the edge
    # absorbs virtually all traffic and the origin roundtrip (~200-500ms)
    # stops being on every user's critical path.
    #
    # Static assets: immutable 1-year. They effectively never change at a
    # given URL (a redeploy is a whole new image), and if we ever need to
    # bust we add a query string at the reference site.
    map $sent_http_content_type $cache_control {
        default                       "public, max-age=300, stale-while-revalidate=86400";
        ~^text/html                   "public, max-age=300, stale-while-revalidate=86400";
        ~^text/css                    "public, max-age=31536000, immutable";
        ~^application/javascript      "public, max-age=31536000, immutable";
        ~^image/                      "public, max-age=31536000, immutable";
        ~^font/                       "public, max-age=31536000, immutable";
        ~^application/font            "public, max-age=31536000, immutable";
    }

    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;

        # We listen on 8080 behind an HTTPS ingress. Without these, nginx
        # bakes `http://host:8080/...` into every Location header, which
        # leaks the internal port and downgrades to http. Relative
        # redirects let the client's browser reuse the inbound scheme+host.
        absolute_redirect off;
        port_in_redirect off;

        # Security headers (apply to every response, including errors)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control $cache_control always;

        # ---- Legacy URL redirects (301 permanent) ----
        # Old:   /posts/2025-11-07-on-matters-of-great-importance.html
        # New:   /writing/matters-of-great-importance
        # Two rules: the more-specific "on-" case first so it wins, then
        # the generic strip-date case as a fallback for anything else.
        # Regex patterns are double-quoted so nginx doesn't parse the
        # `{4}` quantifiers as config block delimiters.
        location ~ "^/posts/\d{4}-\d{2}-\d{2}-on-(.+)\.html$" {
            return 301 /writing/$1;
        }
        location ~ "^/posts/\d{4}-\d{2}-\d{2}-(.+)\.html$" {
            return 301 /writing/$1;
        }
        # Old:   /writing.html   →   /writing
        location = /writing.html {
            return 301 /writing;
        }

        # Main routing: try the exact file, then a directory with index.html,
        # then the same path with a .html extension. Anything that doesn't
        # resolve gets a real 404 (not a silent homepage fallback).
        location / {
            try_files $uri $uri/ $uri.html =404;
        }

        error_page 404 /404.html;
    }
}
